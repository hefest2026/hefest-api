name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: ['**']

# Cancel superseded runs on the same ref to save minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  # The hefest package is imported from the repo root (not installed).
  PYTHONPATH: .

jobs:
  lint:
    name: Ruff (lint + format)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - run: uv sync --frozen --all-groups
      - name: ruff check
        run: uv run ruff check .
      - name: ruff format --check
        run: uv run ruff format --check .

  typecheck:
    name: ty (static types)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - run: uv sync --frozen --all-groups
      - name: ty check
        run: uv run ty check

  migrations:
    name: Migration dry-run (no DB)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - run: uv sync --frozen --all-groups
      - name: Render migration SQL without executing it
        run: uv run python scripts/ci_check_migrations.py

  test:
    name: pytest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - run: uv sync --frozen --all-groups
      - name: pytest
        # Exit code 5 = "no tests collected"; treat as success so branches that
        # don't add tests yet stay green. Any real failure still fails the job.
        run: |
          set +e
          uv run pytest -q
          code=$?
          if [ "$code" -eq 5 ]; then echo "::notice::No tests collected"; exit 0; fi
          exit "$code"
