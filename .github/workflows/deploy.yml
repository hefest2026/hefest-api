name: Deploy

# Runs only after the CI workflow finishes successfully on main, i.e. once a PR
# has been merged. The host, user, port and SSH key all come from secrets, so the
# server IP never appears in this file or in the logs.
on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]

# Never run two production deploys at once; let an in-flight deploy finish.
concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to production
    runs-on: ubuntu-latest
    # Only deploy when the triggering CI run was green.
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    environment: production
    steps:
      - name: Pull latest main and rebuild on the host
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || '22' }}
          script_stop: true
          script: |
            set -euo pipefail
            cd /opt/hefest/hefest-api
            git fetch --prune origin
            git reset --hard origin/main
            cd /opt/hefest/hefest-compose
            docker compose up -d --build
            docker compose ps
            docker image prune -f
